<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}" />
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
  <meta property="og:site_name" content="{{ .Site.Title }}" />
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-default.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ .Title }} | {{ .Site.Title }}" />
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <meta name="twitter:image" content="{{ .Site.BaseURL }}images/og-default.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a class="logo" href="/">DeployCraft<span>.io</span></a>
      <nav>
        <a href="/docs">Docs</a>
        <a href="/tutorials">Tutorials</a>
        <a href="/blog">Blog</a>
        <a href="/labs">Labs</a>
        <a href="/snippets">Snippets</a>
        <a href="/about">About</a>
        <a href="/#subscribe" class="btn-nav">Subscribe</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© {{ now.Year }} DeployCraft.io · DevSecOps · CI/CD · Cloud Native Engineering</p>
      <p class="tagline">Built by practitioners, for practitioners.</p>
      <div class="footer-links">
        <a href="{{ .Site.Params.github }}" target="_blank">GitHub</a>
        <a href="{{ .Site.Params.linkedin }}" target="_blank">LinkedIn</a>
        <a href="mailto:{{ .Site.Params.email }}">Contact</a>
      </div>
    </div>
  </footer>

  <script src="/js/copy.js"></script>
</body>
</html>
